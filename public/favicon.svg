<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1a1d"/>
      <stop offset="0.5" stop-color="#0f0f12"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="eyeStroke" x1="0" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle amber glow behind the eye -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Inner border highlight -->
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="#f59e0b" stroke-opacity="0.15" stroke-width="3"/>
  <!-- Eye outline (amber gradient) -->
  <path d="M96 256s70-130 160-130 160 130 160 130-70 130-160 130S96 256 96 256Z" stroke="url(#eyeStroke)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="64" stroke="url(#eyeStroke)" stroke-width="26" fill="none"/>
  <!-- Pupil (solid amber) -->
  <circle cx="256" cy="256" r="22" fill="#fbbf24"/>
  <!-- Highlight -->
  <circle cx="276" cy="236" r="9" fill="#fef3c7"/>
</svg>
